<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* CSS to remove margins and set full screen */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }
        #flash-container { width: 100vw; height: 100vh; }
        #flash-container ruffle-player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="flash-container"></div>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("flash-container").appendChild(player);
            player.load({ url: "http://cdn.jsdelivr.net/gh/randomperson324/g/Flash Sources/papaspizzeria.swf ", letterbox: "on" });
        });
    </script>
</body>
</html>
